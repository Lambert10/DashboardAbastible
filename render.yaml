services:
  - type: web
    name: dashboard-lab-api
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STREAK_API_KEY
        sync: false
      - key: STREAK_API_BASE_URL
        value: https://api.streak.com
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: DASHBOARD_HISTORY_START_DAY_KEY
        value: 2025-12-15
      - key: DASHBOARD_LEGACY_END_DAY_KEY
        value: 2026-02-25
      - key: DASHBOARD_OFFICIAL_START_DAY_KEY
        value: 2026-03-04
      - key: DASHBOARD_OFFICIAL_TOTAL_PROVIDERS
        value: 1420
      - key: DASHBOARD_OFFICIAL_TOTAL_TOLERANCE
        value: 1
      - key: DASHBOARD_LEGACY_MIN_TOTAL_PROVIDERS
        value: 3000
